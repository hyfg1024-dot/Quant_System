# ============================================
# 策略V5：核心资产防守 + 概念退潮做空
# 设计日期：2026年4月
# ============================================
# 
# 设计要点：
# - 多头从"纯高股息"升级为"股息+增长"双引擎
# - 减少油煤集中度（从50%降到10%），避免大宗商品崩盘风险
# - 空头换血：从已跌到底的EV，换成仍有下跌空间的AI概念和消费下行标的
# ============================================

strategy_name: "V5_核心资产防守"
description: "做多现金流确定+盈利增长的核心资产，做空估值泡沫和基本面恶化的概念股"
sector: ""

backtest:
  start_date: "2023-01-01"
  end_date: "today"

capital:
  total: 1000000
  rmb_to_hkd_rate: 1.1
  long_pct: 0.65
  short_pct: 0.20
  cash_buffer_pct: 0.15

# ============================================
# 多头：两个桶（防御+增长）
# ============================================
long_positions:

  # --- 桶1：防御型现金流（占多头60%）---
  - code: "0941.HK"    # 中国移动
    weight: 0.30
    # 理由：电信垄断，不依赖油价煤价，股息增长确定
    # 比海油/神华更稳：没有大宗商品周期波动
    # 5G数据流量持续增长，资本开支已见顶

  - code: "0939.HK"    # 建设银行
    weight: 0.15
    # 理由：大行底仓，股息率8%+，受益于信贷政策放松
    # 低beta防御标的

  - code: "0883.HK"    # 中国海油
    weight: 0.10
    # 理由：保留小仓位作为通胀/地缘政治对冲
    # 但从V4的25%降到10%，大幅减少油价暴跌的风险敞口

  # --- 桶2：增长型核心资产（占多头45%）---
  - code: "0700.HK"    # 腾讯控股
    weight: 0.30
    # 理由：港股市值最大的科技龙头
    # 游戏版号恢复 + 视频号商业化 + 云/AI收入增长
    # 每年回购超千亿港元，相当于额外分红
    # PE约15-18x，对于盈利增速15-20%的公司不算贵

  - code: "3900.HK"    # 绿城中国
    weight: 0.15
    # 理由：地产修复期的伏笔仓位
    # 中交集团控股，实质国企，但市场仍给民企折价
    # 产品力行业前三，如果地产触底会有巨大弹性
    # 小仓位试探，如果V3信号出现（弱势跑赢强势）则加仓

# ============================================
# 空头：概念退潮 + 基本面恶化
# ============================================
short_positions:

  - code: "0020.HK"    # 商汤
    weight: 0.50
    # 理由：AI概念的典型"故事股"
    # 持续巨额亏损，收入增长靠政府补贴
    # 估值依赖AI叙事，但迟迟没有盈利拐点
    # 限售股解禁持续压制股价
    # 如果AI概念退潮，这类公司首当其冲

  - code: "2331.HK"    # 李宁
    weight: 0.50
    # 理由：消费下行周期的受害者
    # 品牌力从"国潮巅峰"持续下滑
    # 库存周转天数恶化，打折清库存侵蚀利润
    # 面临安踏（多品牌）和耐克（国际回归）的双面夹击
    # 管理层战略摇摆（高端化失败后又转向大众）

weighting_mode: "manual"

rebalance:
  frequency: "monthly"     # 从季度改为月度 — 空头标的波动大需要更频繁管理
  day: 1

costs:
  commission_rate: 0.0015
  slippage: 0.001
  short_borrow_rate: 0.08  # 商汤和李宁是大盘股，借券费率合理

stop_loss:
  single_long_stop: -0.20
  single_long_action: "halve"
  single_short_stop: 0.30     # 概念股可能被炒作，留30%缓冲
  single_short_action: "close"
  portfolio_stop: -0.12
  portfolio_action: "close_all"

sensitivity:
  borrow_rates: [0.03, 0.05, 0.08, 0.12, 0.15]