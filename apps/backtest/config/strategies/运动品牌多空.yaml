# ============================================
# 策略V7：运动消费品 — 品牌升级 vs 品牌衰退
# 核心逻辑：消费行业马太效应，强者愈强弱者愈弱
# ============================================

strategy_name: "V7_运动品牌对冲"
description: "做多品牌矩阵成功的安踏+波司登+特步，做空品牌力下滑的李宁+361度"
sector: "sportswear"

backtest:
  start_date: "2022-01-01"   # 从国潮退热开始
  end_date: "today"

capital:
  total: 1000000
  rmb_to_hkd_rate: 1.1
  long_pct: 0.60
  short_pct: 0.25
  cash_buffer_pct: 0.15

# === 多头：品牌护城河 ===
long_positions:
  - code: "2020.HK"    # 安踏体育 — 行业绝对龙头
    weight: 0.50
  - code: "3998.HK"    # 波司登 — 品牌升级+高股息
    weight: 0.25
  - code: "1368.HK"    # 特步国际 — 跑步垂直赛道+低估值弹性
    weight: 0.25

# === 空头：品牌衰退 ===
short_positions:
  - code: "2331.HK"    # 李宁 — 空头核心仓位
    weight: 0.65
  - code: "1361.HK"    # 361度 — 低端被挤压
    weight: 0.35

weighting_mode: "manual"

rebalance:
  frequency: "monthly"
  day: 1

costs:
  commission_rate: 0.0015
  slippage: 0.001
  short_borrow_rate: 0.08     # 李宁是大盘股，借券费率低

stop_loss:
  single_long_stop: -0.20
  single_long_action: "halve"
  single_short_stop: 0.30     # 李宁可能因为消息面短期反弹，留缓冲
  single_short_action: "close"
  portfolio_stop: -0.12
  portfolio_action: "close_all"

sensitivity:
  borrow_rates: [0.03, 0.05, 0.08, 0.12, 0.15]

events:
  - date: "2023-03-01"
    label: "李宁2022年报低于预期"
  - date: "2024-08-01"
    label: "安踏始祖鸟收入首次超越FILA"